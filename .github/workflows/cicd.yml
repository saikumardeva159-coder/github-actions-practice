name: CICD

on: 
  workflow_dispatch:

jobs:
   code:
     runs-on: ubuntu-latest
     steps:
       - name: clone the code
         run: echo "cloning the code"
   build:
      needs: [code]
      runs-on: ubuntu-latest
      steps:
        - name: build using docker
          run: echo "building using docker"
   test:
     needs: [build]
     runs-on: ubuntu-latest
     steps:
       - name: running test  cases
         run: echo "testing app"
   deploy:
     needs: [build,test]
     runs-on: ubuntu-latest
     steps:
       - name: deploying on machine
         run: echo "deployed the code"
   
